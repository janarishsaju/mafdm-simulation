services:
  - type: web
    name: mafdm-simulation
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: PORT
        value: "10000"
      - key: HOST
        value: "0.0.0.0"
      - key: OPENAI_API_KEY
        sync: false   # set manually in Render dashboard (optional — omit for demo mode)
